<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JLPT Estudos{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-selo">学</span>
                <span class="brand-textos">
                    <span class="brand-jp">日本語学</span>
                    <span class="brand-pt">JLPT Estudos</span>
                </span>
            </a>
            <nav class="topnav">
                <a href="{{ url_for('vocabulario.roadmap', nivel='N5') }}">N5</a>
                <a href="{{ url_for('vocabulario.roadmap', nivel='N4') }}">N4</a>
                <a href="{{ url_for('kana.visao') }}">Kana</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-list">
                    {% for cat, msg in messages %}
                        <div class="flash flash-{{ cat }}">{{ msg }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <span class="footer-mark">学</span>
            <span>JLPT Estudos · 日本語学 · porta 5003</span>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='audio.js') }}"></script>
</body>
</html>
